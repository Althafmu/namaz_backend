name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r namaz_backend/requirements.txt
          pip install black isort flake8 mypy pytest
      - name: Lint with black
        run: black --check namaz_backend/
      - name: Lint with isort
        run: isort --check-only namaz_backend/
      - name: Lint with flake8
        run: flake8 namaz_backend/
      - name: Type check with mypy
        run: mypy namaz_backend/
      - name: Run tests
        run: pytest namaz_backend/
